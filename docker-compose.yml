services:
  glpi-db:
    container_name: glpi-mariadb
    image: mariadb:10.11
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PWD}
      - MARIADB_DATABASE=${GLPI_DB_NAME}
      - MARIADB_USER=${GLPI_DB_USER}
      - MARIADB_PASSWORD=${GLPI_DB_PASSWORD}
    volumes:
      - ./glpi-prod/mysql:/var/lib/mysql
    networks:
      - stack_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  glpi:
    container_name: glpi-app
    image: glpi/glpi:${GLPI_VERSION:-latest}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      glpi-db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      - TIMEZONE=America/Sao_Paulo
      - PHP_MEMORY_LIMIT=512M
      - PHP_POST_MAX_SIZE=32M
      - PHP_UPLOAD_MAX_FILESIZE=32M
      - GLPI_DB_HOST=glpi-db
      - GLPI_DB_NAME=${GLPI_DB_NAME}
      - GLPI_DB_USER=${GLPI_DB_USER}
      - GLPI_DB_PASSWORD=${GLPI_DB_PASSWORD}
    env_file:
      - ./.env
    volumes:
      - ./glpi-prod/config:/var/glpi/config
      - ./glpi-prod/files:/var/glpi/files
      - ./glpi-prod/marketplace:/var/www/glpi/marketplace
    networks:
      - stack_network
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int)(false===@file_get_contents('http://127.0.0.1/')));"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  stack_network:
    external: true

